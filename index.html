<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Meta de Economia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="painel">
        <h2>PROTOCOLO <strong>ESCONOMIA ATIVO</strong></h2>

        <div class ="status">
            <span>0<span>%</span></span>
            <span>STATUS: OPERACIONAL</span>
        </div>

        <div class="barra">
            <div id="modobarra"></div>
        </div>

        <div class="input-group">
            <label>DEFINIR ALVO (R$)</label>
            <input type="number" id="alvo" placeholder="Digite o valor alvo">
        </div>

        <div class="input-group">
            <label>CARGA ATUAL (R$)</label>
            <input type="number" id="carga" placeholder="Digite a carga atual">
        </div>

        
    </div>
    
</body>

</html>
